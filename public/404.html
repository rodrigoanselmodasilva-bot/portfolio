<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // Redirect unknown paths back to the SPA entry, preserving the path as ?p=
      var l = window.location;
      var base = "/portfolio/";
      var path = l.pathname.slice(base.length);
      l.replace(
        l.protocol + "//" + l.host + base +
        "?p=" + encodeURIComponent(path) +
        (l.search ? "&q=" + encodeURIComponent(l.search.slice(1)) : "") +
        l.hash
      );
    </script>
  </head>
</html>
